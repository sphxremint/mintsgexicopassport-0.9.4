
#Feathers Weaponry Configuration v1.0.2
[general]
	#Config version for migration purposes. Do not modify manually.
	#Range: 1 ~ 100
	configVersion = 2
	#Time in ticks required for drawing a bow, crossbow, or trident before deducting feathers.
	#Default value: 15 ticks; Minimum: 1 tick; Maximum: 100 ticks.
	#Range: 1 ~ 100
	drawTimeThreshold = 20
	#Air (bubble) threshold. If the player's air is below this value, feather deductions are multiplied by 2.
	#Default value: 4; Minimum: 0; Maximum: 20.
	#Range: 0 ~ 20
	bubbleThreshold = 0
	#List of valid item IDs for bow-like items. These items trigger the draw deduction when used.
	validBowItems = ["minecraft:bow=1.0", "minecraft:crossbow=1.1", "minecraft:trident=1.3"]
	#List of valid item IDs for weapon-based actions. These items trigger feather deductions when used to attack.
	validWeaponItems = ["minecraft:wooden_sword=0.8", "minecraft:stone_sword=0.9", "minecraft:iron_sword=1.0", "minecraft:golden_sword=1.1", "minecraft:diamond_sword=0.9", "minecraft:netherite_sword=1.2", "minecraft:wooden_axe=0.9", "minecraft:stone_axe=1.0", "minecraft:iron_axe=1.1", "minecraft:golden_axe=1.2", "minecraft:diamond_axe=0.9", "minecraft:netherite_axe=1.3", "minecraft:trident=1.3"]

#Rotator Cuff Tears - Random punishment when exhausted from item usage
[punishment]
	#Enable Rotator Cuff Tears punishment system
	rotatorCuffEnabled = false
	#Minimum damage dealt by Rotator Cuff Tears (in half-hearts, 1.0 = 0.5 hearts)
	#Range: 0.0 ~ 20.0
	rotatorCuffMinDamage = 1.0
	#Maximum damage dealt by Rotator Cuff Tears (in half-hearts, 6.0 = 3 hearts)
	#Range: 0.0 ~ 20.0
	rotatorCuffMaxDamage = 6.0
	#Only apply Rotator Cuff Tears on Hard and Hardcore difficulty
	rotatorCuffHardModeOnly = false

#Shield feather consumption settings
[shield]
	#Enable overtime shield cost (feathers consumed while shield is raised)
	shieldOvertimeEnabled = false
	#Feathers consumed per second while shield is raised
	#Range: 0.0 ~ 10.0
	shieldOvertimeCost = 0.0
	#Enable damage-based shield cost (feathers consumed based on damage blocked)
	shieldDamageEnabled = true
	#Multiplier for damage-blocked feather cost (feathers = damage_blocked * factor)
	#Range: 0.0 ~ 5.0
	shieldDamageFactor = 0.05

#Item usage restrictions based on feather levels
[restrictions]
	#Minimum feathers required to use right-click items (bow, crossbow, trident, shield, etc.)
	#Range: 0 ~ 20
	rightClickMinFeathers = 0
	#Minimum feathers required to use left-click items (weapons, tools)
	#Range: 0.0 ~ 20.0
	leftClickMinFeathers = 0.0
	#Cancel animations when player doesn't have enough feathers
	cancelAnimations = true

#Feather costs for player movement
[movement]
	#Enable feather costs for movement
	movementCostsEnabled = true
	#Feathers consumed per second while swimming
	#Range: 0.0 ~ 10.0
	swimmingCostPerSecond = 0.05
	#Feathers consumed per second while running/sprinting
	#Range: 0.0 ~ 10.0
	runningCostPerSecond = 0.25
	#Feathers consumed per second while flying (elytra/creative) - base cost for straight flight
	#Range: 0.0 ~ 10.0
	flyingCostPerSecond = 0.0
	#Feathers consumed per second while walking
	#Range: 0.0 ~ 10.0
	walkingCostPerSecond = 0.0

#Activity-specific exhaustion punishments
[activityPunishments]
	#Enable activity-specific punishments (Swimmer's Shoulder, Runner's Fatigue, etc.)
	activityPunishmentsEnabled = false
	#Only apply activity punishments on Hard and Hardcore difficulty
	activityPunishmentsHardModeOnly = false
	#Swimmer's Shoulder minimum damage (in half-hearts, 1.0 = 0.5 hearts)
	#Range: 0.0 ~ 20.0
	swimmerShoulderMinDamage = 0.0
	#Swimmer's Shoulder maximum damage (in half-hearts, 3.0 = 1.5 hearts)
	#Range: 0.0 ~ 20.0
	swimmerShoulderMaxDamage = 0.0
	#Runner's Fatigue minimum damage (in half-hearts, 1.0 = 0.5 hearts)
	#Range: 0.0 ~ 20.0
	runnerFatigueMinDamage = 0.0
	#Runner's Fatigue maximum damage (in half-hearts, 2.0 = 1 heart)
	#Range: 0.0 ~ 20.0
	runnerFatigueMaxDamage = 0.0
	#Pilot's Strain minimum damage (in half-hearts, 1.0 = 0.5 hearts)
	#Range: 0.0 ~ 20.0
	pilotStrainMinDamage = 0.0
	#Pilot's Strain maximum damage (in half-hearts, 2.0 = 1 heart)
	#Range: 0.0 ~ 20.0
	pilotStrainMaxDamage = 0.0
	#Walker's Cramp damage (in half-hearts, 1.0 = 0.5 hearts)
	#Range: 0.0 ~ 20.0
	walkerCrampDamage = 0.0

#Learning Curve - Players become more efficient with practice
[learningCurve]
	#Enable learning curve system (reduces feather costs as players gain experience)
	learningCurveEnabled = false
	#Minimum cost multiplier after full training (0.1 = 10% of original cost)
	#Range: 0.0 ~ 1.0
	learningCurveMinMultiplier = 0.1
	#Stat value required to reach minimum cost (e.g., 100000 blocks walked)
	#Range: 1000 ~ 10000000
	learningCurveMaxStat = 100000
	#Learning rate - how quickly players improve (higher = faster learning)
	#Range: 0.1 ~ 10.0
	learningCurveRate = 1.0

#Velocity Reduction - Reduce projectile speed instead of blocking when low feathers
[velocityReduction]
	#Enable velocity reduction system (projectiles fly slower when low feathers instead of being blocked)
	velocityReductionEnabled = false
	#Velocity multiplier when feathers are below requirement (0.3 = 30% speed, deals less damage)
	#Range: 0.1 ~ 1.0
	lowFeatherVelocityMultiplier = 0.3
	#Reset crossbow charge state if player runs out of feathers before fully charged
	crossbowResetOnFail = false

#Flying Maneuverability - Increase costs for complex aerial maneuvers
[flyingManeuverability]
	#Enable dynamic flying costs based on direction/angle changes
	flyingManeuverabilityEnabled = false
	#Cost multiplier for maneuvering (2.0 = double cost when turning/changing angles)
	#Range: 1.0 ~ 10.0
	flyingManeuverabilityMultiplier = 1.0
	#Threshold for detecting significant direction change (radians, 0.3 = ~17 degrees)
	#Range: 0.1 ~ 3.14
	flyingManeuverabilityThreshold = 0.3

